[project]
name = "modbus-ctrl-simulation"
version = "0.1.0"
description = "Simulator package for Modbus Control Software Suite"
requires-python = ">=3.11"
dependencies = [
    "pymodbus>=3.8.0",
    "modbus-schema-common",
    "modbus-config",
    "modbus-ctrl-contracts",
]

[project.scripts]
modbus-sim = "modbus_ctrl_simulation.server:main"

[tool.uv.sources]
modbus-schema-common = { workspace = true }
modbus-config = { workspace = true }
modbus-ctrl-contracts = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
