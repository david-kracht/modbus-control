[project]
name = "modbus-ctrl-simulation"
version = "0.1.0"
description = "Simulator package for Modbus Control Software Suite"
requires-python = ">=3.11"
dependencies = [
    "pymodbus>=3.8.0",
    "modbus-schema-common>=1.0.0",
    "modbus-config>=1.1.0",
    "modbus-ctrl-contracts>=0.1.0",
    "typer>=0.12.0",
]

[project.scripts]
modbus-sim = "modbus_ctrl_simulation.server:main"

[tool.uv.sources]
# === REGISTRY SWITCH ===
# Development: Sibling packages resolve locally from the workspace paths.
# Production Release: Comment out the lines in [tool.uv.sources] below to resolve published versions from PyPI registry.
modbus-schema-common = { workspace = true }
modbus-config = { workspace = true }
modbus-ctrl-contracts = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
