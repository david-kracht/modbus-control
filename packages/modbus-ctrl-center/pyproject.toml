[project]
name = "modbus-ctrl-center"
version = "0.1.0"
description = "Web Service & SPA Control Center for Modbus Control Suite"
requires-python = ">=3.8"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn>=0.28.0",
    "websockets>=12.0",
    "modbus-ctrl-core>=0.1.0",
    "modbus-ctrl-contracts>=0.1.0",
    "typer>=0.12.0",
]

[project.scripts]
modbus-ctrl-center = "modbus_ctrl_center.server:main"

[tool.uv.sources]
# === REGISTRY SWITCH ===
# Development: Sibling packages resolve locally from the workspace paths.
# Production Release: Comment out the lines in [tool.uv.sources] below to resolve published versions from PyPI registry.
modbus-ctrl-core = { workspace = true }
modbus-ctrl-contracts = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
