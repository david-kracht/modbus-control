[project]
name = "modbus-ctrl-center"
version = "0.1.0"
description = "Web Service & SPA Control Center for Modbus Control Suite"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn>=0.28.0",
    "websockets>=12.0",
    "modbus-ctrl-core",
    "modbus-ctrl-contracts",
]

[project.scripts]
modbus-ctrl-center = "modbus_ctrl_center.server:main"

[tool.uv.sources]
modbus-ctrl-core = { workspace = true }
modbus-ctrl-contracts = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
